name: Refresh stock prices

on:
  workflow_dispatch:
  schedule:
    # Broad UTC window covering 9:30 AM–4:00 PM New York time across DST changes.
    # scripts/update-prices.mjs enforces exact NYSE weekdays, holidays, and regular-session hours.
    - cron: '*/30 13-21 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-stock-prices
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-prices:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh GitHub JSON price database
        run: npm run update-prices
      - name: Commit refreshed prices
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'chore: refresh stock prices'
          file_pattern: 'data/stocks.json public/data/stocks.json'
      - name: Build updated site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
      - name: Deploy updated prices to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
